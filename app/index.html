<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Bridge" />
<meta name="theme-color" content="#ffffff" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<title>Bridge</title>
<style>
  :root{--ink:#18181b;--sub:#6b7280;--faint:#9ca3af;--line:#ececec;--line2:#e4e4e7;--bg:#fff;--soft:#fafafa;--hover:#f4f4f5;--sel:#f0f0f1;
    --blue:#2563eb;--green:#16a34a;--red:#dc2626;--cc:#cc6b4f;--cx:#111;--gm:#4285f4;--purple:#7c3aed;
    --safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}
  #app{height:100%;display:flex;flex-direction:column}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  /* header */
  .hdr{padding:calc(var(--safe-top) + 8px) 16px 8px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line);background:#fff}
  .brand{display:flex;align-items:center;gap:9px;font-size:19px;font-weight:700;letter-spacing:-.01em}
  .pillbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line2);border-radius:11px;padding:9px 13px;font-size:13.5px;font-weight:500;background:#fff;color:var(--ink)}
  .pillbtn.dark{background:var(--ink);color:#fff;border-color:var(--ink)}
  /* chips */
  .chips{display:flex;gap:10px;padding:14px 16px 4px;overflow-x:auto;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;display:flex;align-items:center;gap:10px;border:1px solid var(--line2);border-radius:14px;padding:11px 14px;min-width:170px;background:#fff}
  .chip.sel{border-color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .chip .ic{width:34px;height:34px;border-radius:9px;background:var(--soft);border:1px solid var(--line2);display:grid;place-items:center}
  .chip .nm{font-size:14.5px;font-weight:600;line-height:1.2}
  .chip .st{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:6px;margin-top:2px}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  /* context header */
  .ctxh{padding:18px 16px 10px}
  .ctxh .row1{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .ctxh .nm{font-size:24px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:9px;min-width:0}
  .ctxh .nm span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ctxh .st{font-size:14px;color:var(--sub);display:flex;align-items:center;gap:6px;font-weight:400}
  .ctxh .br{margin-top:8px;font-size:13px;color:var(--faint);display:flex;align-items:center;gap:7px}
  .model{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line2);border-radius:11px;padding:9px 12px;font-size:13.5px}
  .icbtn{width:40px;height:40px;border:1px solid var(--line2);border-radius:11px;display:grid;place-items:center;background:#fff}
  /* feed */
  .msg{display:flex;gap:12px;padding:16px;border-bottom:1px solid var(--line)}
  .av{width:30px;height:30px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:11px;font-weight:700}
  .av.you{background:var(--ink);color:#fff}
  .msg .who{display:flex;align-items:center;gap:8px}
  .msg .who b{font-size:15px}
  .msg .who .t{margin-left:auto;font-size:12px;color:var(--faint)}
  .msg .tx{font-size:15px;line-height:1.5;margin-top:5px;white-space:pre-wrap;word-break:break-word;color:#27272a}
  .tool{display:flex;align-items:center;gap:9px;font-size:13.5px;margin-top:7px}
  .tool .mk{flex:none}
  .tool .mk.ok{color:var(--green)} .tool .mk.no{color:var(--line2)}
  .tool .vb{color:var(--ink)} .tool .pa{color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mergebtn{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;border:none;border-radius:11px;padding:11px 15px;font-size:14px;font-weight:600;margin-top:10px}
  .submsg{font-size:13px;color:var(--faint);margin-top:8px}
  /* status line + composer */
  .modebar{padding:8px 16px 2px;display:flex}
  .modepill{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:999px;padding:8px 13px;font-size:13px;font-weight:600}
  .composer{margin:6px 16px calc(var(--safe-bot) + 8px);border:1px solid var(--line2);border-radius:16px;padding:14px 14px 10px;background:#fff}
  .composer .ph{color:var(--faint);font-size:15px}
  .composer .bar{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
  .composer .plus{width:34px;height:34px;border:1px solid var(--line2);border-radius:50%;display:grid;place-items:center;color:var(--sub);font-size:18px}
  .composer .send{width:40px;height:40px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:18px}
  #ci{width:100%;border:none;outline:none;font-size:15.5px;background:transparent;font-family:inherit}
  .promptc{margin:6px 16px calc(var(--safe-bot) + 8px);border:1px solid var(--blue);border-radius:16px;padding:14px;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.07)}
  .promptc .ttl{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .promptc .sub{font-size:13.5px;color:var(--sub);margin-bottom:11px;word-break:break-word;line-height:1.45}
  .promptc .aq{font-size:14.5px;font-weight:600;margin:6px 0 8px}
  .promptc .opt{display:block;width:100%;border:1px solid var(--line2);border-radius:12px;padding:12px 13px;font-size:14.5px;text-align:left;background:#fff;margin-bottom:8px}
  .pa-row{display:flex;gap:10px}
  .pa-row button{flex:1;border-radius:12px;padding:13px;font-size:14.5px;font-weight:600;border:1px solid var(--line2);background:#fff}
  .pa-row .allow{background:var(--ink);color:#fff;border-color:var(--ink)}
  /* tab bar */
  .tabs{display:flex;border-top:1px solid var(--line);padding:8px 0 calc(var(--safe-bot) + 6px);background:#fff}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--faint);font-size:11px;font-weight:500;background:none;border:none;padding:4px}
  .tab.on{color:var(--ink)}
  /* lists / generic */
  .lrow{display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:1px solid var(--line)}
  .lrow:active{background:var(--hover)}
  .lrow .nm{font-size:15px;font-weight:600} .lrow .meta{font-size:12.5px;color:var(--faint)} .lrow .when{margin-left:auto;font-size:11.5px;color:var(--faint)}
  .empty{text-align:center;color:var(--faint);font-size:14px;padding:48px 20px}
  .sectit{font-size:12px;letter-spacing:.05em;color:var(--faint);padding:18px 16px 8px;font-weight:600}
  .card2{margin:8px 16px;border:1px solid var(--line2);border-radius:14px;overflow:hidden}
  .srow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px}
  .srow+.srow{border-top:1px solid var(--line)}
  .btn{background:var(--ink);color:#fff;border:none;border-radius:11px;padding:11px 16px;font-size:14px;font-weight:600}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line2)}
  .toast{position:fixed;left:50%;bottom:calc(var(--safe-bot) + 86px);transform:translateX(-50%);background:rgba(20,20,24,.94);color:#fff;font-size:13px;padding:10px 16px;border-radius:11px;z-index:99;max-width:80%;text-align:center}
  /* slash palette */
  .palette{margin:0 16px}
  .palette .p{display:flex;align-items:center;gap:10px;border:1px solid var(--line2);border-bottom:none;padding:12px 14px;background:#fff;font-size:14.5px}
  .palette .p:first-child{border-radius:12px 12px 0 0} .palette .p:last-child{border-radius:0 0 12px 12px;border-bottom:1px solid var(--line2)}
  .palette .p .c{font-family:ui-monospace,monospace;font-weight:600} .palette .p .d{color:var(--sub);font-size:12.5px;margin-left:auto}
  /* sheet */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:80;display:flex;align-items:flex-end}
  .sheet{background:#fff;width:100%;border-radius:18px 18px 0 0;max-height:80vh;display:flex;flex-direction:column;padding-bottom:calc(var(--safe-bot) + 8px)}
  .sheet h3{margin:0;padding:18px 18px 8px;font-size:17px}
  .sheet .sub2{padding:0 18px 8px;font-size:13px;color:var(--sub)}
  .sheet .list{overflow-y:auto}
  .sheet .mr{display:flex;align-items:center;gap:12px;padding:14px 18px;border-top:1px solid var(--line)}
  .sheet .mr .ck{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line2);display:grid;place-items:center;flex:none}
  .sheet .mr .ck.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .sheet .act{padding:14px 18px;display:flex;gap:10px}
  .sheet .act button{flex:1;border-radius:12px;padding:14px;font-size:15px;font-weight:600;border:1px solid var(--line2);background:#fff}
  .sheet .act .go{background:var(--ink);color:#fff;border-color:var(--ink)} .sheet .act .go:disabled{opacity:.4}
  .menu-btn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--faint);font-size:18px;flex:none}
  /* login */
  .login{height:100%;display:flex;flex-direction:column;justify-content:center;gap:14px;max-width:360px;margin:0 auto;padding:24px}
  .logo{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;margin:0 auto;background:linear-gradient(160deg,#1c1e24,#0c0d10);box-shadow:0 10px 30px -10px rgba(20,20,45,.4)}
  .login h1{font-size:24px;margin:6px 0 0;font-weight:700;letter-spacing:-.02em;text-align:center}
  .login p{color:var(--sub);font-size:14px;margin:0;text-align:center;line-height:1.45}
  .seg{display:flex;background:var(--soft);border:1px solid var(--line2);border-radius:11px;padding:3px}
  .seg button{flex:1;border:none;background:none;border-radius:9px;padding:9px;font-size:13.5px;font-weight:600;color:var(--sub)}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .field{display:flex;align-items:center;gap:9px;border:1px solid var(--line2);border-radius:12px;padding:13px 14px;background:#fff}
  .field:focus-within{border-color:var(--blue)} .field svg{flex:none;color:var(--faint)}
  input{flex:1;min-width:0;border:none;outline:none;font-size:16px;background:transparent}
  .lbtn{width:100%;background:var(--ink);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
  .lbtn:disabled{opacity:.5}
  .err{color:var(--red);font-size:13px;line-height:1.45;border:1px solid rgba(220,38,38,.3);background:rgba(220,38,38,.06);border-radius:11px;padding:11px 13px}
  .hint{color:var(--faint);font-size:12px;text-align:center;line-height:1.45}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const URL="https://xjhxftholvlxuvtecdls.supabase.co";
const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqaHhmdGhvbHZseHV2dGVjZGxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjAwMjMsImV4cCI6MjA5NzAzNjAyM30.2KUDAlpvlNofSBIArY1tOr5flnoK9s8hbsry0hCxUpI";
const sb=createClient(URL,ANON);
const app=document.getElementById("app");
const esc=(s)=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const ago=(iso)=>{ if(!iso)return""; const d=(Date.now()-new Date(iso).getTime())/1000; if(d<60)return"now"; if(d<3600)return Math.floor(d/60)+"m"; if(d<86400)return Math.floor(d/3600)+"h"; return Math.floor(d/86400)+"d"; };
const M_SVG=`<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2 17 L8 8 L11 12 L9.5 14 L7.5 14 Z M11 17 L16 8 L22 17 L19 17 L16 12 L14.5 14.5 Z"/></svg>`;
const ENG={
  claude:{n:"Claude Code",c:"#cc6b4f",g:`<svg width="20" height="20" viewBox="0 0 24 24"><g stroke="#cc6b4f" stroke-width="2" stroke-linecap="round"><path d="M12 4v16M4 12h16M6 6l12 12M18 6 6 18"/></g></svg>`},
  codex:{n:"Codex",c:"#111",g:`<svg width="20" height="20" viewBox="0 0 24 24" fill="#111">${[...Array(8)].map((_,i)=>{const a=i/8*6.283;return `<circle cx="${12+7*Math.cos(a)}" cy="${12+7*Math.sin(a)}" r="1.6"/>`}).join("")}</svg>`},
  gemini:{n:"Gemini",c:"#4285f4",g:`<svg width="20" height="20" viewBox="0 0 24 24" fill="#4285f4"><path d="M12 2c.7 4.9 4.4 8.6 9.3 9.3v1.4C16.4 13.4 12.7 17.1 12 22h-1.4c-.7-4.9-4.4-8.6-9.3-9.3v-1.4C6.2 10.6 9.9 6.9 10.6 2z"/></svg>`}
};
const MODELS={opus:"Opus 4.8",sonnet:"Sonnet 4.6",haiku:"Haiku 4.5"};
const MODELABEL={default:"ask every time",acceptEdits:"auto-accept edits",plan:"plan",bypassPermissions:"bypass"};
const ICO={shield:`<path d="M8 1.8 13 3.5v4.2c0 3.3-2.3 5.4-5 6.5-2.7-1.1-5-3.2-5-6.5V3.5z"/>`,check:`<circle cx="8" cy="8" r="6.3"/><path d="M5.4 8.2 7 9.8l3.6-4.1"/>`,clip:`<rect x="4.3" y="3" width="7.4" height="11" rx="1.5"/><path d="M6.3 3V2.1h3.4V3"/>`,bolt:`<path d="M9 1.5 3.6 9H7.5l-.8 5.4L12.4 7H8.2z"/>`};
const ic=(d,c)=>`<svg width="14" height="14" viewBox="0 0 16 16" fill="${d==="bolt"?c:"none"}" stroke="${c}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">${ICO[d]}</svg>`;
const MODE_META={
  default:{label:"Ask every time",short:"Ask",icon:"shield",color:"#6b7280",desc:"Prompts before any edit or command."},
  acceptEdits:{label:"Auto-accept edits",short:"Auto-accept",icon:"check",color:"#16a34a",desc:"Edits apply automatically. Risky actions still ask."},
  plan:{label:"Plan first",short:"Plan",icon:"clip",color:"#2563eb",desc:"Proposes a plan and waits for approval."},
  bypassPermissions:{label:"Bypass permissions",short:"Bypass",icon:"bolt",color:"#c2710c",desc:"Everything runs without asking. Use with care."},
};
const STATUS=(r)=>{ if(r.busy) return {t:"Running",c:"var(--blue)"}; if((r.status||"").toLowerCase().includes("review")) return {t:"Review",c:"var(--purple)"}; if(r.status==="Completed") return {t:"Done",c:"var(--green)"}; return {t:"Idle",c:"var(--faint)"}; };
const chipIcon=(r)=> ENG[r.agent]?.g || ENG.claude.g;

let S={view:"login",tab:"chat",ctxId:null,contexts:[],messages:[],email:"",chans:[],macModel:"sonnet",macMode:"default"};
let ctrl=null, pending={}, ackOk=false, ctrlReady=false;   // pending[promptId] = {id, contextId, tool, input}
function sendCmd(p){ try{ ctrl?.send({type:"broadcast",event:"cmd",payload:p}); }catch{} }
function sendCmdAck(p, label){
  if(!ctrlReady){ toast("Connecting… try again in a second."); return; }
  ackOk=false; sendCmd(p);
  setTimeout(()=>{ if(!ackOk) toast("Your Mac didn't respond. Open Bridge on the Mac, update it to the latest, and turn Relay on."); }, 5000);
  if(label) toast(label);
}
function joinControl(userId){
  if(ctrl){ try{sb.removeChannel(ctrl);}catch{} }
  ctrl=sb.channel(`relay-${userId}`,{config:{broadcast:{self:false}}});
  ctrl.on("broadcast",{event:"prompt"},({payload})=>{ pending[payload.id]=payload; if(S.tab==="chat"&&payload.contextId===S.ctxId) render(); });
  ctrl.on("broadcast",{event:"prompt_clear"},({payload})=>{ delete pending[payload.id]; if(S.tab==="chat"&&payload.contextId===S.ctxId) render(); });
  ctrl.on("broadcast",{event:"ack"},()=>{ ackOk=true; });
  ctrl.on("broadcast",{event:"sessions"},({payload})=>{ openResumeSheet(payload&&payload.list); });
  ctrl.on("broadcast",{event:"selected"},async({payload})=>{ if(!payload||!payload.contextId) return; if(payload.model)S.macModel=payload.model; if(payload.mode)S.macMode=payload.mode; S.ctxId=payload.contextId;
    if(!S.contexts.find(c=>c.id===S.ctxId)){ const {data}=await sb.from("contexts").select("*").order("updated_at",{ascending:false}); S.contexts=data||[]; }
    if(S.tab==="chat") loadMessages(); });
  ctrl.subscribe((st)=>{ ctrlReady=(st==="SUBSCRIBED"); if(st==="SUBSCRIBED") sendCmd_sync(); });
}
function sendCmd_sync(){ try{ ctrl?.send({type:"broadcast",event:"sync",payload:{}}); }catch{} }
function clearChans(){ S.chans.forEach(c=>sb.removeChannel(c)); S.chans=[]; }
function toast(t){ const e=document.createElement("div"); e.className="toast"; e.textContent=t; document.body.appendChild(e); setTimeout(()=>e.remove(),2200); }
const readonly=()=>toast("Read-only for now — control from your phone is coming next.");

async function boot(){
  const {data}=await sb.auth.getSession();
  if(data.session){ S.email=data.session.user.email||""; enter(); } else showLogin();
}
sb.auth.onAuthStateChange((_e,s)=>{ if(!s){ clearChans(); showLogin(); } });

/* ---------- login ---------- */
let loginMode="in";
function friendly(m){ m=(m||"").toLowerCase();
  if(m.includes("rate limit")||m.includes("over_email_send")) return "Confirmation emails are rate-limited. On the Mac's Supabase project, turn OFF “Confirm email” (Authentication → Email), then try again.";
  if(m.includes("not confirmed")) return "That account isn't confirmed. Turn off “Confirm email” in Supabase, or confirm the user under Authentication → Users.";
  if(m.includes("invalid login")) return "Wrong email or password."; return m; }
function showLogin(err){
  clearChans(); S.view="login"; const up=loginMode==="up";
  app.innerHTML=`<div class="login"><div class="logo">${M_SVG.replace('width="22" height="22"','width="30" height="30"').replace(/currentColor/g,'#fff')}</div>
    <h1>Bridge</h1><p>${up?"Create an account, then sign in on your Mac with the same one.":"Sign in with the same account as your Mac to watch your chats live."}</p>
    <div class="seg"><button id="mi" class="${up?"":"on"}">Sign in</button><button id="mu" class="${up?"on":""}">Create account</button></div>
    <div class="field"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="3.5" width="12" height="9" rx="1.5"/><path d="M2.5 4.5 8 8.5l5.5-4"/></svg><input id="em" type="email" inputmode="email" placeholder="you@email.com" autocapitalize="off" autocorrect="off"/></div>
    <div class="field"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3.5" y="7" width="9" height="6" rx="1.3"/><path d="M5.5 7V5.2a2.5 2.5 0 0 1 5 0V7"/></svg><input id="pw" type="password" placeholder="password"/></div>
    <button class="lbtn" id="go">${up?"Create account":"Sign in"}</button>
    ${err?`<div class="err">${esc(err)}</div>`:(up?`<div class="hint">First time? Turn off “Confirm email” in Supabase so sign-up works without an email.</div>`:"")}</div>`;
  mi.onclick=()=>{loginMode="in";showLogin();}; mu.onclick=()=>{loginMode="up";showLogin();};
  const submit=async()=>{ go.disabled=true; const email=em.value.trim(),password=pw.value; if(!email||!password){go.disabled=false;return;}
    const {data,error}=up?await sb.auth.signUp({email,password}):await sb.auth.signInWithPassword({email,password}); go.disabled=false;
    if(error) showLogin(friendly(error.message));
    else if(up&&!data.session) showLogin("Account created, but email confirmation is on. Turn it off in Supabase, then sign in.");
    else { S.email=email; enter(); } };
  go.onclick=submit; pw.addEventListener("keydown",e=>{if(e.key==="Enter")submit();});
}

/* ---------- app shell ---------- */
async function enter(){
  S.view="app";
  const { data: sess } = await sb.auth.getUser(); if(sess?.user?.id) joinControl(sess.user.id);
  const {data}=await sb.from("contexts").select("*").order("updated_at",{ascending:false});
  S.contexts=(data||[]);
  if(!S.ctxId && S.contexts[0]) S.ctxId=S.contexts[0].id;
  if(S.ctxId) await loadMessages(); else render();
  clearChans();
  S.chans.push(sb.channel("c").on("postgres_changes",{event:"*",schema:"public",table:"contexts"},async()=>{
    const {data}=await sb.from("contexts").select("*").order("updated_at",{ascending:false}); S.contexts=(data||[]);
    if(!S.ctxId && S.contexts[0]) S.ctxId=S.contexts[0].id; if(S.tab==="chat"||S.tab==="contexts"||S.tab==="activity") render();
  }).subscribe());
  S.chans.push(sb.channel("m").on("postgres_changes",{event:"*",schema:"public",table:"messages"},async(p)=>{

function chatBind(){
  document.querySelectorAll("[data-chip]").forEach(c=>c.onclick=()=>{S.ctxId=c.dataset.chip;loadMessages();sendCmd({kind:"select",contextId:c.dataset.chip});});
  const md=document.getElementById("modepill"); if(md) md.onclick=openModeSheet;
  const mb=document.getElementById("modelbtn"); if(mb) mb.onclick=openEngineSheet;
  const cm=document.getElementById("ctxmenu"); if(cm) cm.onclick=openCtxMenu;
  const nc=document.getElementById("newchat"); if(nc) nc.onclick=()=>sendCmdAck({kind:"newContext"},"Creating a new chat…");
  const mg=document.getElementById("merge"); if(mg) mg.onclick=openMergeSheet;
  const bm=document.getElementById("bmerge"); if(bm) bm.onclick=openMergeSheet;
  const cur=S.contexts.find(c=>c.id===S.ctxId);
  const send=document.getElementById("send"), ci=document.getElementById("ci"), plus=document.getElementById("plus");

  };
  if(ci) ci.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send&&send.click(); } });
  const pal=document.getElementById("palette");
  const drawPal=()=>{ if(!pal||!ci) return; const v=ci.value.trim();
    if(v.startsWith("/")&&!v.includes(" ")){ const q=v.slice(1).toLowerCase(); const items=SLASH.filter(s=>s.c.slice(1).startsWith(q));
      pal.innerHTML=items.map(s=>`<div class="p" data-cmd="${s.c}" data-arg="${s.arg?1:0}"><span class="c">${s.c}</span><span class="d">${s.d}</span></div>`).join("");
      pal.querySelectorAll("[data-cmd]").forEach(el=>el.onclick=()=>{ const c=el.dataset.cmd; if(el.dataset.arg==="1"){ ci.value=c+" "; ci.focus(); drawPal(); } else { sendCmdAck({kind:"send",contextId:S.ctxId,text:c},"Sent to your Mac…"); ci.value=""; pal.innerHTML=""; } });
    } else pal.innerHTML=""; };
  if(ci) ci.addEventListener("input",drawPal);
  const pr=Object.values(pending).find(p=>p.contextId===S.ctxId);
  if(pr){
    document.querySelectorAll("[data-allow]").forEach(b=>b.onclick=()=>{ sendCmdAck({kind:"respond",contextId:S.ctxId,id:pr.id,behavior:"allow"}); delete pending[pr.id]; render(); });
    document.querySelectorAll("[data-deny]").forEach(b=>b.onclick=()=>{ sendCmdAck({kind:"respond",contextId:S.ctxId,id:pr.id,behavior:"deny"}); delete pending[pr.id]; render(); });
    document.querySelectorAll("[data-aq]").forEach(b=>b.onclick=()=>{ const qs=(pr.input&&pr.input.questions)||[]; const q=qs[+b.dataset.aq]; const o=q.options[+b.dataset.oi];

      if(qs.every(qq=>pAns[pr.id][qq.question])){ sendCmdAck({kind:"respond",contextId:S.ctxId,id:pr.id,behavior:"allow",updatedInput:{...pr.input,answers:pAns[pr.id]}}); delete pending[pr.id]; delete pAns[pr.id]; }
      render(); });
  }
}

function activityView(){
  const rows=actMsgs.slice(0,60).map(m=>{const ctx=S.contexts.find(c=>c.id===m.context_id);const who=m.role==="you"?"You":(m.role==="bridge"?"Bridge":(ENG[m.cli]||ENG.claude).n);
    return `<div class="lrow" data-open="${m.context_id}"><span style="width:22px;display:grid;place-items:center">${m.role==="you"?`<div class="av you" style="width:22px;height:22px;font-size:9px">${esc((S.email||"me").slice(0,2).toUpperCase())}</div>`:(m.role==="bridge"?M_SVG.replace(/22/g,"18"):(ENG[m.cli]||ENG.claude).g)}</span>
    <div style="min-width:0;flex:1"><div class="nm" style="font-size:14px">${esc(who)} <span style="color:var(--faint);font-weight:400">· ${esc(ctx?.name||"")}</span></div><div class="meta" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc((m.text||"(tool activity)").slice(0,80))}</div></div>
    <span class="when">${ago(m.updated_at)}</span></div>`;}).join("");
  return `<div class="hdr"><div class="brand">${M_SVG} Activity</div></div><div class="scroll">${rows||`<div class="empty">No activity yet.</div>`}</div>`;
}
async function loadActivity(){ const {data}=await sb.from("messages").select("*").order("updated_at",{ascending:false}).limit(60); actMsgs=data||[]; if(S.tab==="activity") render(); }

/* ---------- settings tab ---------- */
let macOnline=false;
function settingsView(){
  return `<div class="hdr"><div class="brand">${M_SVG} Settings</div></div><div class="scroll">
    <div class="sectit">ACCOUNT</div><div class="card2"><div class="srow"><div><div style="font-size:14.5px;font-weight:600">Signed in</div><div style="font-size:12.5px;color:var(--sub)">${esc(S.email)}</div></div><button class="btn ghost" id="out">Sign out</button></div></div>
    <div class="sectit">YOUR MAC</div><div class="card2"><div class="srow"><div><div style="font-size:14.5px;font-weight:600">Relay status</div><div style="font-size:12.5px;color:var(--sub)">${macOnline?"Online — doing the work":"Offline — open Bridge on your Mac"}</div></div><span class="dot" style="background:${macOnline?"var(--green)":"var(--faint)"}"></span></div></div>
    <div class="sectit">ABOUT</div><div class="card2"><div class="srow"><div style="font-size:13px;color:var(--sub);line-height:1.5">Your Mac does the work; the phone sends prompts and approves actions. Risky actions still follow the context's permission mode on the Mac. Add to Home Screen for the full-screen app.</div></div></div>
    </div>`;
}
function settingsBind(){ const o=document.getElementById("out"); if(o)o.onclick=()=>sb.auth.signOut(); }
async function presence(){ const {data}=await sb.from("devices").select("*").eq("device","desktop").maybeSingle(); macOnline = !!(data&&data.online&&(Date.now()-new Date(data.last_seen).getTime()<70000)); if(S.tab==="settings")render(); }

// keep activity + presence fresh
setInterval(()=>{ if(S.view==="app"){ loadActivity(); presence(); } }, 20000);
sb.channel("dev").on("postgres_changes",{event:"*",schema:"public",table:"devices"},presence).subscribe();
const _enter=enter; enter=async()=>{ await _enter(); loadActivity(); presence(); };

boot();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
